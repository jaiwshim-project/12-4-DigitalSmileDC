<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>기사 마이그레이션</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body style="font-family:sans-serif;max-width:600px;margin:60px auto;padding:20px;">
  <h2>localStorage → Supabase 마이그레이션</h2>
  <button id="btn" onclick="run()" style="padding:12px 24px;font-size:1rem;background:#0A2463;color:#fff;border:none;border-radius:8px;cursor:pointer;">
    마이그레이션 시작
  </button>
  <pre id="log" style="margin-top:20px;padding:16px;background:#f5f5f5;border-radius:8px;white-space:pre-wrap;"></pre>

  <script>
    function log(msg) {
      document.getElementById('log').textContent += msg + '\n';
    }

    async function run() {
      document.getElementById('btn').disabled = true;
      document.getElementById('log').textContent = '';

      const sb = supabase.createClient(
        'https://haxcktfnuudlqciyljtp.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhheGNrdGZudXVkbHFjaXlsanRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkzMDUwNDAsImV4cCI6MjA4NDg4MTA0MH0.suN7BeaHx3MjaNlMDQa0940P-rMl2XPyk4ksoQEU3YM'
      );

      // localStorage 데이터 읽기
      const local = JSON.parse(localStorage.getItem('ds_articles') || '[]');
      log('localStorage 기사 수: ' + local.length + '개');

      if (local.length === 0) {
        log('이전할 데이터가 없습니다.');
        document.getElementById('btn').disabled = false;
        return;
      }

      // Supabase 기존 URL 목록 가져오기
      const { data: existing, error: fetchErr } = await sb.from('articles').select('url');
      if (fetchErr) { log('Supabase 조회 실패: ' + fetchErr.message); return; }
      log('Supabase 기존 기사 수: ' + (existing || []).length + '개');

      const existingUrls = new Set((existing || []).map(r => r.url));

      // 중복 제거 후 삽입할 행 준비
      const rows = local
        .filter(a => !existingUrls.has(a.url))
        .map(a => ({
          url:       a.url,
          title:     a.title,
          thumbnail: a.thumbnail || '',
          summary:   a.summary   || '',
          category:  a.category  || 'AI 진단',
          read_time: a.readTime  || '3분',
          tags:      a.tags      || [],
          date:      a.date      || ''
        }));

      log('새로 이전할 기사: ' + rows.length + '개');

      if (rows.length === 0) {
        log('모두 이미 Supabase에 있습니다.');
        document.getElementById('btn').disabled = false;
        return;
      }

      // Supabase에 삽입
      const { data, error } = await sb.from('articles').insert(rows).select();
      if (error) {
        log('삽입 실패: ' + error.message);
      } else {
        log('✅ 완료! ' + data.length + '개 이전됨');
        log('이제 articles.html 에서 확인하세요.');
      }

      document.getElementById('btn').disabled = false;
    }
  </script>
</body>
</html>
