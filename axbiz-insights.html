<div class="shell">
<aside class="sidebar" id="sidebar"></aside>
<div class="main">
  <div class="topbar">
    <a href="index.html" class="home-btn" title="랜딩 페이지로">🏠</a>
    <h1>AI 인사이트 & 전략 제안</h1>
    <span class="badge" id="pageDate"></span>

  <div class="content">

    <div class="section-heading">AI 인사이트 & 전략 제안</div>

      </div>

      <button class="form-btn" onclick="generateInsights(true)">🔄 새 인사이트 생성</button>
      <button class="form-btn" style="background:var(--cyan)" onclick="copyInsights()">📋 클립보드 복사</button>
      <button class="form-btn green" onclick="sendInsightEmail()">📧 이메일 발송</button>
    </div>

    <!-- 인사이트 카드 그리드 -->
    <div id="insightCards" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px"></div>

        <div>

        </div>
      </div>
      <div class="card-note">

    </div>

  </div>
</div>

var _curInsights = [];

function _pickInsight(arr, seed) {
  return arr[Math.abs(Math.floor(seed)) % arr.length];
}

function generateInsights(forceNew) {
  var today = new Date();
  var start = new Date(today.getFullYear(), 0, 0);
  var doy   = Math.floor((today - start) / 86400000);
  var seed  = forceNew ? (Math.floor(Math.random() * 997) + 1) : doy;

  document.getElementById('insightDate').textContent =
    today.toLocaleDateString('ko-KR', {year:'numeric', month:'long', day:'numeric', weekday:'long'});

  var cats = [
    {key:'market',    label:'📊 시장 인사이트',  color:'blue'},
    {key:'strategy',  label:'💡 전략 제안',       color:'purple'},
    {key:'action',    label:'⚡ 오늘의 실행',     color:'cyan'},
    {key:'risk',      label:'⚠️ 리스크 경보',    color:'red'},
    {key:'community', label:'🌱 커뮤니티',        color:'green'},
    {key:'finance',   label:'💰 재무 전략',       color:'yellow'},
  ];

  _curInsights = [];
  var html = '';
  cats.forEach(function(cat, idx) {
    var ins = _pickInsight(_insDB[cat.key], seed + idx * 31);
    _curInsights.push({cat: cat.label, t: ins.t, b: ins.b, a: ins.a});
    var cv = 'var(--' + cat.color + ')';
    html += `
      <div class="card" style="border-top:3px solid ${cv};margin-bottom:0">
        <div style="font-size:11px;font-weight:700;color:${cv};letter-spacing:.6px;margin-bottom:10px">${cat.label}</div>
        <div style="font-size:15px;font-weight:700;margin-bottom:10px;line-height:1.4">${ins.t}</div>
        <div style="font-size:13px;color:var(--text-2);line-height:1.75;margin-bottom:12px">${ins.b}</div>
        <div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:10px 12px;font-size:12px">
          <span style="font-weight:600;color:${cv}">⚡ 실행 제안:</span> ${ins.a}
        </div>
      </div>`;
  });
  document.getElementById('insightCards').innerHTML = html;
}

function copyInsights() {
  var dateStr = document.getElementById('insightDate').textContent;
  var text = 'AX BIZ 그룹 CEO 인사이트\n' + dateStr + '\n\n';
  _curInsights.forEach(function(ins) {
    text += '【' + ins.cat + '】\n▶ ' + ins.t + '\n' + ins.b + '\n⚡ ' + ins.a + '\n\n';
  });
  navigator.clipboard.writeText(text)
    .then(function() { alert('클립보드에 복사되었습니다!'); })
    .catch(function() { prompt('아래 텍스트를 복사하세요:', text); });
}

function sendInsightEmail() {
  var email   = document.getElementById('emailInput').value || 'jaiwshim@gmail.com';
  var dateStr = document.getElementById('insightDate').textContent;
  var subject = 'AX BIZ AI 인사이트 — ' + dateStr;
  var body = 'AX BIZ 그룹 CEO 인사이트\n' + dateStr + '\n\n';
  _curInsights.forEach(function(ins) {
    body += '【' + ins.cat + '】\n▶ ' + ins.t + '\n' + ins.b + '\n⚡ ' + ins.a + '\n\n';
  });
  window.open('mailto:' + encodeURIComponent(email) + '?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body));
}

// 자동 발송 체크박스 처리
document.getElementById('autoSend').addEventListener('change', function() {
  if (this.checked) {
    var lastSent = localStorage.getItem('axbiz_insight_sent_date');
    var today = new Date().toISOString().slice(0,10);
    if (lastSent !== today) {
      sendInsightEmail();
      localStorage.setItem('axbiz_insight_sent_date', today);
    }
  }
});

// 초기 실행
generateInsights(false);
</script>
